<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hayato — Creative Portfolio</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .heading-font { font-family: 'Playfair Display', serif; }
    .project-card:hover img { transform: scale(1.05); }
    .project-card img { transition: transform 0.4s ease; }
    .view-fade { opacity: 1; pointer-events: auto; }
    .view-fade.hidden { display: none; opacity: 0; pointer-events: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .view-fade.fade-in { animation: fadeIn 0.6s cubic-bezier(0.4,0,0.2,1); }

    /* タイトル：左からフェードイン */
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-24px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .title-anim.run { animation: slideInLeft 0.6s cubic-bezier(0.4,0,0.2,1) both; }
    #category-title-ja.run { animation-delay: 0.12s; }

    /* ヘッダー：名前・肩書きが左からスライドイン */
    @keyframes heroSlideIn {
      from { opacity: 0; transform: translateX(-30px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    /* ヘッダー：紹介文が下からニョキッと出る */
    @keyframes heroRiseUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-slide { opacity: 0; }
    .hero-slide.run { animation: heroSlideIn 0.7s cubic-bezier(0.4,0,0.2,1) forwards; }
    .hero-rise  { opacity: 0; }
    .hero-rise.run  { animation: heroRiseUp 0.6s cubic-bezier(0.4,0,0.2,1) forwards; }

    /* マーキーギャラリー */
    .marquee-wrap {
      overflow: hidden;
      width: 100%;
      -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
      mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
    }
    .marquee-track {
      display: flex;
      gap: 1.5rem;
      width: max-content;
      animation: marqueeScroll 30s linear infinite;
    }
    .marquee-track:hover { animation-play-state: paused; }
    @keyframes marqueeScroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .marquee-track img {
      height: 180px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
    }
    @media (max-width: 639px) {
      .marquee-track img { height: 120px; }
    }

    .masonry { columns: 2; column-gap: 1.5rem; }
    @media (min-width: 1024px) { .masonry { columns: 3; } }
    @media (max-width: 639px) { .masonry { columns: 1; } }
    .masonry > * { break-inside: avoid; margin-bottom: 1.5rem; }

    /* スクロールで徐々に表示（下スクロール時のみ） */
    .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .reveal.shown { opacity: 1; transform: translateY(0); }

    /* ローディング：プログレスバー */
    #loader {
      position: fixed; inset: 0; z-index: 100;
      background: rgb(248, 246, 243);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px;
      transition: opacity 0.4s ease;
    }
    #loader.hide { opacity: 0; pointer-events: none; }
    #loader-track {
      width: 200px; height: 3px;
      background: rgba(155, 124, 92, 0.2);
      border-radius: 3px; overflow: hidden;
    }
    #loader-bar {
      width: 0%; height: 100%;
      background: rgb(155, 124, 92);
      border-radius: 3px;
    }
    #loader-bar.run { animation: loadBar 0.8s cubic-bezier(0.4,0,0.2,1) forwards; }
    @keyframes loadBar {
      0% { width: 0%; }
      60% { width: 70%; }
      100% { width: 100%; }
    }
    #loader-label {
      font-style: italic; letter-spacing: 0.1em;
      color: rgb(155, 124, 92); font-size: 13px;
    }
  </style>
</head>
<body class="min-h-screen" style="background: linear-gradient(180deg, rgb(248, 246, 243) 0%, rgb(242, 237, 230) 50%, rgb(248, 246, 243) 100%);">

  <!-- LOADER -->
  <div id="loader">
    <div id="loader-track"><div id="loader-bar"></div></div>
    <p id="loader-label">Loading</p>
  </div>

  <!-- HOME VIEW -->
  <div id="home-view" class="view-fade">
    <header class="w-full">
      <div class="max-w-5xl mx-auto px-6 py-16 flex flex-col md:flex-row items-center gap-10">
        <img loading="lazy" class="w-36 h-36 rounded-full object-cover shadow-lg flex-shrink-0" src="images/profile.jpg" alt="Portrait">
        <div>

          <p id="hero-tagline" class="mt-2 hero-slide" style="color: rgb(107, 92, 76); font-weight: 500; font-size: 18px;">Physical Therapist &amp; Designer</p>
          <p id="hero-desc" class="mt-4 leading-relaxed hero-rise" style="color: rgb(74, 74, 74); font-weight: 400; font-size: 15px;">チラシ・図解・スライド・SNS画像まで、Canvaを活用して幅広く制作しています。<br>医療や健康の専門知識を活かし、"伝わる"デザインで想いをカタチにします。</p>
        </div>
      </div>
    </header>

    <main class="w-full">
      <!-- Gallery：流れるマーキー -->
      <section class="pb-16">
        <h2 class="heading-font mb-8 max-w-5xl mx-auto px-6" style="color: rgb(26, 26, 26); font-weight: 700; font-size: 32px;">Gallery</h2>
        <div class="marquee-wrap">
          <div id="marquee-track" class="marquee-track"></div>
        </div>
      </section>

      <section class="max-w-5xl mx-auto px-6 pb-20">
        <h2 class="heading-font mb-10" style="color: rgb(26, 26, 26); font-weight: 700; font-size: 32px;">Works</h2>
        <div id="works-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-8 sm:gap-10">
          <article class="project-card cursor-pointer text-center group" data-category="promotion">
            <img loading="lazy" class="w-32 h-32 sm:w-40 sm:h-40 mx-auto rounded-full object-cover transition-transform" src="images/icon-promotion.png" alt="チラシ">
            <p class="mt-4 tracking-wider" style="font-style: italic; color: rgb(155, 124, 92); font-size: 14px;">PROMOTION</p>
            <h3 class="mt-1 font-medium" style="color: rgb(26, 26, 26); font-weight: 500; font-size: 17px;">チラシ</h3>
          </article>
          <article class="project-card cursor-pointer text-center group" data-category="medical">
            <img loading="lazy" class="w-32 h-32 sm:w-40 sm:h-40 mx-auto rounded-full object-cover transition-transform" src="images/icon-medical.png" alt="患者用資料">
            <p class="mt-4 tracking-wider" style="font-style: italic; color: rgb(155, 124, 92); font-size: 14px;">MEDICAL</p>
            <h3 class="mt-1 font-medium" style="color: rgb(26, 26, 26); font-weight: 500; font-size: 17px;">患者用資料</h3>
          </article>
          <article class="project-card cursor-pointer text-center group" data-category="infographic">
            <img loading="lazy" class="w-32 h-32 sm:w-40 sm:h-40 mx-auto rounded-full object-cover transition-transform" src="images/icon-infographic.png" alt="ブログ図解">
            <p class="mt-4 tracking-wider" style="font-style: italic; color: rgb(155, 124, 92); font-size: 14px;">INFOGRAPHIC</p>
            <h3 class="mt-1 font-medium" style="color: rgb(26, 26, 26); font-weight: 500; font-size: 17px;">ブログ図解</h3>
          </article>
          <article class="project-card cursor-pointer text-center group" data-category="presentation">
            <img loading="lazy" class="w-32 h-32 sm:w-40 sm:h-40 mx-auto rounded-full object-cover transition-transform" src="images/icon-presentation.png" alt="セミナースライド">
            <p class="mt-4 tracking-wider" style="font-style: italic; color: rgb(155, 124, 92); font-size: 14px;">PRESENTATION</p>
            <h3 class="mt-1 font-medium" style="color: rgb(26, 26, 26); font-weight: 500; font-size: 17px;">セミナースライド</h3>
          </article>
          <article class="project-card cursor-pointer text-center group" data-category="social">
            <img loading="lazy" class="w-32 h-32 sm:w-40 sm:h-40 mx-auto rounded-full object-cover transition-transform" src="images/icon-social.png" alt="SNS画像">
            <p class="mt-4 tracking-wider" style="font-style: italic; color: rgb(155, 124, 92); font-size: 14px;">SOCIAL</p>
            <h3 class="mt-1 font-medium" style="color: rgb(26, 26, 26); font-weight: 500; font-size: 17px;">SNS画像</h3>
          </article>
          <article class="project-card cursor-pointer text-center group" data-category="business">
            <img loading="lazy" class="w-32 h-32 sm:w-40 sm:h-40 mx-auto rounded-full object-cover transition-transform" src="images/icon-business.png" alt="事業説明スライド">
            <p class="mt-4 tracking-wider" style="font-style: italic; color: rgb(155, 124, 92); font-size: 14px;">BUSINESS</p>
            <h3 class="mt-1 font-medium" style="color: rgb(26, 26, 26); font-weight: 500; font-size: 17px;">事業説明スライド</h3>
          </article>
        </div>
      </section>
    </main>

    <footer class="w-full py-8 text-center">
      <p class="text-sm" style="color: rgb(138, 138, 138); font-size: 16px;">© 2026 hayato. All rights reserved.</p>
    </footer>
  </div>

  <!-- LEVEL 2 VIEW -->
  <div id="category-view" class="hidden view-fade">
    <div class="max-w-5xl mx-auto px-6 py-10">
      <button id="back-btn" class="inline-flex items-center justify-center w-10 h-10 rounded-full mb-8 hover:opacity-80 transition-opacity" style="background: rgb(155, 124, 92);" aria-label="戻る"><i data-lucide="arrow-left" style="width: 20px; height: 20px; color: #fff;"></i></button>
      <div class="mb-8">
        <p id="category-title-en" class="title-anim" style="font-style: italic; letter-spacing: 0.08em; color: rgb(155,124,92); font-size: 15px;"></p>
        <h2 id="category-title-ja" class="heading-font font-bold title-anim" style="color:#1a1a1a; font-size: 30px; line-height: 1.2;"></h2>
      </div>
      <div id="category-gallery" class="masonry"></div>
    </div>
  </div>

  <!-- LEVEL 3 VIEW -->
  <div id="slides-view" class="hidden view-fade">
    <div class="max-w-3xl mx-auto px-6 py-10">
      <button id="slides-back-btn" class="inline-flex items-center justify-center w-10 h-10 rounded-full mb-8 hover:opacity-80 transition-opacity" style="background: rgb(155, 124, 92);" aria-label="一覧へ戻る"><i data-lucide="arrow-left" style="width: 20px; height: 20px; color: #fff;"></i></button>
      <h2 id="slides-title" class="heading-font text-3xl font-bold mb-8" style="color:#1a1a1a;"></h2>
      <div id="slides-stack" class="flex flex-col gap-6"></div>
    </div>
  </div>

  <template id="gallery-item-template">
    <div class="rounded-xl overflow-hidden shadow-md cursor-pointer hover:shadow-lg transition-shadow">
      <img loading="lazy" class="w-full block">
    </div>
  </template>

  <template id="collection-item-template">
    <div class="rounded-xl overflow-hidden shadow-md cursor-pointer hover:shadow-lg transition-shadow bg-white">
      <img loading="lazy" class="w-full block">
      <div class="p-4">
        <h3 class="collection-title font-medium" style="color: rgb(26, 26, 26); font-weight: 500; font-size: 18px;"></h3>
      </div>
    </div>
  </template>

  <div id="lightbox" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-75">
    <div class="relative w-full h-full flex items-center justify-center p-4">
      <img id="lightbox-image" loading="lazy" class="max-w-full max-h-[90vh] object-contain">
      <button id="lightbox-close" class="absolute top-4 right-4 p-2 bg-white rounded-full shadow-lg hover:bg-gray-100 transition-colors" aria-label="閉じる"><i data-lucide="x" style="width: 24px; height: 24px; color: #1a1a1a;"></i></button>
      <button id="lightbox-prev" class="absolute left-4 top-1/2 -translate-y-1/2 p-2 bg-white rounded-full shadow-lg hover:bg-gray-100 transition-colors" aria-label="前の画像"><i data-lucide="chevron-left" style="width: 24px; height: 24px; color: #1a1a1a;"></i></button>
      <button id="lightbox-next" class="absolute right-4 top-1/2 -translate-y-1/2 p-2 bg-white rounded-full shadow-lg hover:bg-gray-100 transition-colors" aria-label="次の画像"><i data-lucide="chevron-right" style="width: 24px; height: 24px; color: #1a1a1a;"></i></button>
    </div>
  </div>

  <script>
    /* =========================================================
       作品データ（ここだけ編集すればOK）
       - categoryImages    : 通常2段（画像一覧→拡大）
       - categoryCollections: 3段（まとまり一覧→通し読み→拡大）
       - categoryHubs      : SNS用。2段目でX/Instagramに分岐。
                             各項目 kind:'gallery' か 'collection'
    ========================================================= */

    const categoryImages = {
      promotion: [
        { src: 'images/promotion-1.png', alt: 'チラシ作品1' },
        { src: 'images/promotion-2.png', alt: 'チラシ作品2' },
        { src: 'images/promotion-3.png', alt: 'チラシ作品3' }
      ],
      medical: [
        { src: 'images/medical-1.png', alt: '患者用資料1' },
        { src: 'images/medical-2.png', alt: '患者用資料2' },
        { src: 'images/medical-3.png', alt: '患者用資料3' }
      ],
      infographic: [
        { src: 'images/infographic-1.png', alt: 'ブログ図解1' },
        { src: 'images/infographic-2.png', alt: 'ブログ図解2' },
        { src: 'images/infographic-3.png', alt: 'ブログ図解3' },
        { src: 'images/infographic-4.png', alt: 'ブログ図解4' },
        { src: 'images/infographic-5.png', alt: 'ブログ図解5' },
        { src: 'images/infographic-6.png', alt: 'ブログ図解6' },
        { src: 'images/infographic-7.png', alt: 'ブログ図解7' },
        { src: 'images/infographic-8.png', alt: 'ブログ図解8' },
        { src: 'images/infographic-9.png', alt: 'ブログ図解9' },
        { src: 'images/infographic-10.png', alt: 'ブログ図解10' },
        { src: 'images/infographic-11.png', alt: 'ブログ図解11' },
        { src: 'images/infographic-12.png', alt: 'ブログ図解12' },
        { src: 'images/infographic-13.png', alt: 'ブログ図解13' },
        { src: 'images/infographic-14.png', alt: 'ブログ図解14' },
        { src: 'images/infographic-15.png', alt: 'ブログ図解15' },
        { src: 'images/infographic-16.png', alt: 'ブログ図解16' },
        { src: 'images/infographic-17.png', alt: 'ブログ図解17' }
      ]
    };

    const categoryCollections = {
      presentation: [
        {
          title: 'セミナースライドA',
          slides: [
            'images/presentation-A-1.png','images/presentation-A-2.png','images/presentation-A-3.png',
            'images/presentation-A-4.png','images/presentation-A-5.png','images/presentation-A-6.png',
            'images/presentation-A-7.png','images/presentation-A-8.png','images/presentation-A-9.png',
            'images/presentation-A-10.png'
          ]
        },
        {
          title: 'セミナースライドB',
          slides: [
            'images/presentation-B-1.png','images/presentation-B-2.png','images/presentation-B-3.png',
            'images/presentation-B-4.png','images/presentation-B-5.png','images/presentation-B-6.png',
            'images/presentation-B-7.png','images/presentation-B-8.png','images/presentation-B-9.png',
            'images/presentation-B-10.png','images/presentation-B-11.png','images/presentation-B-12.png',
            'images/presentation-B-13.png','images/presentation-B-14.png','images/presentation-B-15.png',
            'images/presentation-B-16.png'
          ]
        }
      ],
      business: [
        {
          title: '営業資料サンプル',
          slides: [
            'images/business-1.png','images/business-2.png','images/business-3.png',
            'images/business-4.png','images/business-5.png','images/business-6.png','images/business-7.png'
          ]
        },
        {
          title: '営業資料サンプル2',
          slides: [
            'images/business-b-1.png','images/business-b-2.png','images/business-b-3.png',
            'images/business-b-4.png','images/business-b-5.png','images/business-b-6.png',
            'images/business-b-7.png','images/business-b-8.png','images/business-b-9.png',
            'images/business-b-10.png','images/business-b-11.png','images/business-b-12.png'
          ]
        }
      ]
    };

    const categoryHubs = {
      social: [
        {
          label: 'X',
          kind: 'gallery',
          images: ['images/x-1.png','images/x-2.png','images/x-3.png','images/x-4.png','images/x-5.png','images/x-6.png','images/x-7.png']
        },
        {
          label: 'Instagram',
          kind: 'collection',
          posts: [
            { title: '投稿1', slides: ['images/insta-a-1.png','images/insta-a-2.png','images/insta-a-3.png','images/insta-a-4.png','images/insta-a-5.png','images/insta-a-6.png'] },
            { title: '投稿2', slides: ['images/insta-b-1.png','images/insta-b-2.png','images/insta-b-3.png','images/insta-b-4.png','images/insta-b-5.png','images/insta-b-6.png'] }
            // ▼ 投稿追加: ,{ title:'投稿3', slides:['images/insta-c-1.png'] }
          ]
        }
      ]
    };

    const categoryLabels = {
      promotion:    { en: 'PROMOTION',    ja: 'チラシ' },
      medical:      { en: 'MEDICAL',      ja: '患者用資料' },
      infographic:  { en: 'INFOGRAPHIC',  ja: 'ブログ図解' },
      presentation: { en: 'PRESENTATION', ja: 'セミナースライド' },
      social:       { en: 'SOCIAL',       ja: 'SNS画像' },
      business:     { en: 'BUSINESS',     ja: '事業説明スライド' }
    };

    /* ========================== 仕組み ========================== */
    const homeView = document.getElementById('home-view');
    const categoryView = document.getElementById('category-view');
    const slidesView = document.getElementById('slides-view');

    // スクロールで徐々に表示（下スクロール時のみ発動、上では何もしない）
    var lastScrollY = window.scrollY;
    window.addEventListener('scroll', function() { lastScrollY = window.scrollY; }, { passive: true });

    var revealObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('shown');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0, rootMargin: '0px 0px 0px 0px' });

    // 表示中のコンテナ内にある .reveal をまとめて監視開始
    function startReveal(container) {
      var items = container.querySelectorAll('.reveal');
      items.forEach(function(el) {
        if (el.classList.contains('shown')) return;
        revealObserver.observe(el);
      });
      // 保険：1.5秒後に未表示のものは強制表示
      setTimeout(function() {
        items.forEach(function(el) {
          if (!el.classList.contains('shown')) {
            el.classList.add('shown');
            revealObserver.unobserve(el);
          }
        });
      }, 1500);
    }

    // 2段目の戻り先（ホーム or 関数）, 3段目の戻り先（2段目を再描画する関数）
    var backFromCategory = function() { switchView(categoryView, homeView); };
    var backFromSlides = function() { switchView(slidesView, categoryView); };

    // ===== ローディング（プログレスバー） =====
    var loader = document.getElementById('loader');
    var loaderBar = document.getElementById('loader-bar');

    function showLoader(callback) {
      loader.classList.remove('hide');
      loaderBar.classList.remove('run');
      void loaderBar.offsetWidth;
      loaderBar.classList.add('run');
      // バーが伸びきったら隠して、続きの処理を実行
      setTimeout(function() {
        loader.classList.add('hide');
        if (callback) callback();
      }, 800);
    }

    function switchView(hide, show) {
      hide.classList.add('hidden');
      show.classList.remove('hidden');
      window.scrollTo(0, 0);
      // 表示してからアニメーションを付与（display:none解除直後に効かせる）
      void show.offsetWidth;
      show.classList.add('fade-in');
      setTimeout(function() { show.classList.remove('fade-in'); }, 600);
      // 表示が確定してからスクロール表示の監視を開始
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          if (show === categoryView) startReveal(document.getElementById('category-gallery'));
          else if (show === slidesView) startReveal(document.getElementById('slides-stack'));
        });
      });
    }

    document.querySelectorAll('.project-card').forEach(function(card) {
      card.addEventListener('click', function() {
        showLoader(function() { showCategory(card.dataset.category); });
      });
    });
    document.getElementById('back-btn').addEventListener('click', function() { backFromCategory(); });
    document.getElementById('slides-back-btn').addEventListener('click', function() { backFromSlides(); });

    // 画像一覧をMasonryで描く
    function renderGallery(images) {
      var gallery = document.getElementById('category-gallery');
      gallery.innerHTML = '';
      for (var j = 0; j < images.length; j++) {
        (function(img, index) {
          var clone = document.getElementById('gallery-item-template').content.cloneNode(true);
          var imgEl = clone.querySelector('img');
          imgEl.src = img.src; imgEl.alt = img.alt;
          var card = clone.querySelector('div');
          card.addEventListener('click', function() { openLightbox(images, index); });
          gallery.appendChild(clone);
          gallery.lastElementChild.classList.add('reveal');
        })(images[j], j);
      }
    }

    // まとまり/項目の一覧を描く（title + サムネ + クリック動作）
    function renderCards(cards) {
      var gallery = document.getElementById('category-gallery');
      gallery.innerHTML = '';
      for (var i = 0; i < cards.length; i++) {
        (function(card) {
          var clone = document.getElementById('collection-item-template').content.cloneNode(true);
          var imgEl = clone.querySelector('img');
          imgEl.src = card.thumb; imgEl.alt = card.title;
          clone.querySelector('.collection-title').textContent = card.title;
          clone.querySelector('div').addEventListener('click', card.onClick);
          gallery.appendChild(clone);
        })(cards[i]);
      }
    }

    function setTitle(en, ja) {
      var enEl = document.getElementById('category-title-en');
      var jaEl = document.getElementById('category-title-ja');
      enEl.textContent = en || '';
      jaEl.textContent = ja || '';
      // アニメーションを再発火
      enEl.classList.remove('run');
      jaEl.classList.remove('run');
      void enEl.offsetWidth;
      enEl.classList.add('run');
      jaEl.classList.add('run');
    }

    function showCategory(cat) {
      var lbl = categoryLabels[cat] || { en: '', ja: cat };
      setTitle(lbl.en, lbl.ja);
      backFromCategory = function() { switchView(categoryView, homeView); };
      // ギャラリーのレイアウトクラスをリセット
      document.getElementById('category-gallery').className = 'masonry';

      if (categoryHubs[cat]) {
        // SNS：X画像 + Instagram投稿を1画面にまとめて表示
        renderSocialMixed(cat);
      } else if (categoryCollections[cat]) {
        // セミナー/事業：まとまり一覧
        var list = categoryCollections[cat];
        var cards2 = list.map(function(item) {
          return { title: item.title, thumb: item.slides[0], onClick: function() {
            backFromSlides = function() { showCategory(cat); switchView(slidesView, categoryView); };
            showSlides(item);
          } };
        });
        renderCards(cards2);
      } else {
        // 通常：画像一覧
        renderGallery(categoryImages[cat] || []);
      }
      switchView(homeView, categoryView);
    }

    // SNS：X画像とInstagram投稿を1画面にまとめて表示
    function renderSocialMixed(cat) {
      var gallery = document.getElementById('category-gallery');
      gallery.innerHTML = '';
      gallery.className = 'flex flex-wrap gap-6';
      var hubItems = categoryHubs[cat];

      hubItems.forEach(function(hub) {
        // セクション小見出し
        var heading = document.createElement('div');
        heading.className = 'w-full mb-4';
        heading.style.cssText = 'break-before: column; column-span: all;';
        heading.innerHTML = '<p style="font-style: italic; letter-spacing: 0.08em; color: rgb(155,124,92); font-size: 14px; margin-bottom: 4px;">' + hub.label + '</p><hr style="border-color: rgba(155,124,92,0.2); margin-bottom: 16px;">';
        gallery.appendChild(heading);

        if (hub.kind === 'gallery') {
          // X画像：そのまま並べる（クリックで拡大）
          var imgs = hub.images.map(function(src, i) { return { src: src, alt: hub.label + ' ' + (i + 1) }; });
          for (var j = 0; j < imgs.length; j++) {
            (function(img, index) {
              var clone = document.getElementById('gallery-item-template').content.cloneNode(true);
              var imgEl = clone.querySelector('img');
              imgEl.src = img.src; imgEl.alt = img.alt;
              var card = clone.querySelector('div');
              card.addEventListener('click', function() { openLightbox(imgs, index); });
              gallery.appendChild(clone);
              gallery.lastElementChild.classList.add('reveal');
            })(imgs[j], j);
          }
        } else {
          // Instagram投稿：1枚目をサムネイルとして並べる（クリックで通し読み）
          hub.posts.forEach(function(post) {
            var clone = document.getElementById('collection-item-template').content.cloneNode(true);
            var imgEl = clone.querySelector('img');
            imgEl.src = post.slides[0]; imgEl.alt = post.title;
            clone.querySelector('.collection-title').textContent = post.title;
            clone.querySelector('div').addEventListener('click', function() {
              backFromSlides = function() {
                var lbl = categoryLabels[cat] || { en: '', ja: cat };
                setTitle(lbl.en, lbl.ja);
                renderSocialMixed(cat);
                startReveal(document.getElementById('category-gallery'));
                switchView(slidesView, categoryView);
              };
              showSlides(post);
            });
            gallery.appendChild(clone);
          });
        }
      });
    }

    // SNSハブ項目を開く（互換用に残す）
    function openHub(cat, hub) {
      setTitle(categoryLabels[cat].en, hub.label);
      // この2段目から戻ると、ハブのトップ（X/Instagram一覧）へ
      backFromCategory = function() { showCategory(cat); };

      if (hub.kind === 'gallery') {
        var imgs = hub.images.map(function(src, i) { return { src: src, alt: hub.label + ' ' + (i + 1) }; });
        renderGallery(imgs);
        startReveal(document.getElementById('category-gallery'));
      } else {
        var cards = hub.posts.map(function(post) {
          return { title: post.title, thumb: post.slides[0], onClick: function() {
            // 3段目から戻ると、この投稿一覧へ
            backFromSlides = function() { openHub(cat, hub); switchView(slidesView, categoryView); };
            showSlides(post);
          } };
        });
        renderCards(cards);
      }
      // ハブ項目内（2段目のまま）なので画面遷移はしない
    }

    // 3段目：縦に通し読み
    function showSlides(item) {
      document.getElementById('slides-title').textContent = item.title;
      var stack = document.getElementById('slides-stack');
      stack.innerHTML = '';
      var imgs = item.slides.map(function(src, i) { return { src: src, alt: item.title + ' ' + (i + 1) }; });
      for (var j = 0; j < imgs.length; j++) {
        (function(img, index) {
          var el = document.createElement('img');
          el.loading = 'lazy'; el.src = img.src; el.alt = img.alt;
          el.className = 'w-full rounded-xl shadow-md cursor-pointer';
          el.addEventListener('click', function() { openLightbox(imgs, index); });
          el.classList.add('reveal');
          stack.appendChild(el);
        })(imgs[j], j);
      }
      switchView(categoryView, slidesView);
    }

    // ライトボックス
    function openLightbox(images, startIndex) {
      var currentIndex = startIndex;
      var lightbox = document.getElementById('lightbox');
      var lightboxImage = document.getElementById('lightbox-image');
      var closeBtn = document.getElementById('lightbox-close');
      var prevBtn = document.getElementById('lightbox-prev');
      var nextBtn = document.getElementById('lightbox-next');

      function updateImage(index) { lightboxImage.src = images[index].src; lightboxImage.alt = images[index].alt; currentIndex = index; }
      function onPrev() { updateImage((currentIndex - 1 + images.length) % images.length); }
      function onNext() { updateImage((currentIndex + 1) % images.length); }
      function closeLightbox() { lightbox.classList.add('hidden'); document.removeEventListener('keydown', handleKeyPress); }
      function handleKeyPress(e) {
        if (e.key === 'ArrowLeft') onPrev();
        else if (e.key === 'ArrowRight') onNext();
        else if (e.key === 'Escape') closeLightbox();
      }

      updateImage(currentIndex);
      lightbox.classList.remove('hidden');
      lucide.createIcons();
      closeBtn.onclick = closeLightbox;
      prevBtn.onclick = onPrev;
      nextBtn.onclick = onNext;
      lightbox.onclick = function(e) { if (e.target === lightbox) closeLightbox(); };
      document.addEventListener('keydown', handleKeyPress);
    }

    lucide.createIcons();

    // ===== マーキーギャラリー =====
    (function() {
      var marqueeImages = [].concat(
        (categoryImages.medical || []).map(function(o) { return o.src; }),
        (categoryImages.infographic || []).map(function(o) { return o.src; })
      );
      // セミナースライドの実画像も取り込む（サンプルURLは除外）
      if (categoryCollections.presentation) {
        categoryCollections.presentation.forEach(function(col) {
          col.slides.forEach(function(s) {
            if (s.indexOf('images/') === 0) marqueeImages.push(s);
          });
        });
      }
      // ランダムに並べ替え（Fisher-Yates）
      for (var i = marqueeImages.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = marqueeImages[i]; marqueeImages[i] = marqueeImages[j]; marqueeImages[j] = tmp;
      }
      // 無限ループ用に2回繰り返す
      var track = document.getElementById('marquee-track');
      var allImages = marqueeImages.concat(marqueeImages);
      allImages.forEach(function(src) {
        var img = document.createElement('img');
        img.src = src;
        img.alt = 'Gallery';
        img.loading = 'lazy';
        track.appendChild(img);
      });
    })();

    // ===== 初回読み込み時のローディング =====
    function startHeroAnimation() {
      var name = document.getElementById('hero-name');
      var tagline = document.getElementById('hero-tagline');
      var desc = document.getElementById('hero-desc');
      // 名前：左からスライドイン
      name.classList.add('run');
      // 肩書き：少し遅れて左からスライドイン
      setTimeout(function() { tagline.classList.add('run'); }, 200);
      // 紹介文：肩書きのアニメが終わった後、下からニョキッ
      setTimeout(function() { desc.classList.add('run'); }, 900);
    }

    window.addEventListener('load', function() {
      loaderBar.classList.add('run');
      setTimeout(function() {
        loader.classList.add('hide');
        startHeroAnimation();
      }, 800);
    });
    // 万一loadが既に過ぎている場合の保険
    if (document.readyState === 'complete') {
      loaderBar.classList.add('run');
      setTimeout(function() {
        loader.classList.add('hide');
        startHeroAnimation();
      }, 800);
    }

    // ===== 画像の右クリック・ドラッグ保存を抑止 =====
    document.addEventListener('contextmenu', function(e) {
      if (e.target.tagName === 'IMG') e.preventDefault();
    });
    document.addEventListener('dragstart', function(e) {
      if (e.target.tagName === 'IMG') e.preventDefault();
    });
  </script>
</body>
</html>
